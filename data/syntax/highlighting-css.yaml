# Generate by:
#
# printf '`-`{.default}' | pandoc -f markdown -t html \
#     --data-dir data -d formatting --template highlighting-css.yaml
highlighting-css:
  - |
    ```{=html}
    html { -webkit-text-size-adjust: 100%; }
    pre > code.sourceCode { white-space: pre; position: relative; }
    pre > code.sourceCode > span { display: inline-block; line-height: 1.25; }
    pre > code.sourceCode > span:empty { height: 1.2em; }
    .sourceCode { overflow: visible; }
    code.sourceCode > span { color: inherit; text-decoration: inherit; }
    div.sourceCode { margin: 1em 0; }
    pre.sourceCode { margin: 0; }
    @media screen {
    div.sourceCode { overflow: auto; }
    }
    @media print {
    pre > code.sourceCode { white-space: pre-wrap; }
    pre > code.sourceCode > span { text-indent: -5em; padding-left: 5em; }
    }
    pre.numberSource code
      { counter-reset: source-line 0; }
    pre.numberSource code > span
      { position: relative; left: -4em; counter-increment: source-line; }
    pre.numberSource code > span > a:first-child::before
      { content: counter(source-line);
        position: relative; left: -1em; text-align: right; vertical-align: baseline;
        border: none; display: inline-block;
        -webkit-touch-callout: none; -webkit-user-select: none;
        -khtml-user-select: none; -moz-user-select: none;
        -ms-user-select: none; user-select: none;
        padding: 0 4px; width: 4em;
        color: #aaaaaa;
      }
    pre.numberSource { margin-left: 3em; border-left: 1px solid #aaaaaa;  padding-left: 4px; }
    div.sourceCode
      {  background-color: #f6f8fa; }
    @media screen {
    pre > code.sourceCode > span > a:first-child::before { text-decoration: underline; }
    }
    code span { } /* Normal */
    code span.al { color: #ff0000; } /* Alert */
    code span.an { } /* Annotation */
    code span.at { } /* Attribute */
    code span.bn { color: #9f6807; } /* BaseN */
    code span.bu { color: #9f6807; } /* BuiltIn */
    code span.cf { color: #00607c; } /* ControlFlow */
    code span.ch { color: #9f6807; } /* Char */
    code span.cn { } /* Constant */
    code span.co { color: #6a737d; font-style: italic; } /* Comment */
    code span.cv { color: #6a737d; font-style: italic; } /* CommentVar */
    code span.do { color: #6a737d; } /* Documentation */
    code span.dt { color: #00607c; } /* DataType */
    code span.dv { color: #9f6807; } /* DecVal */
    code span.er { color: #ff0000; font-weight: bold; } /* Error */
    code span.ex { } /* Extension */
    code span.fl { color: #9f6807; } /* Float */
    code span.fu { } /* Function */
    code span.im { } /* Import */
    code span.in { color: #6a737d; } /* Information */
    code span.kw { color: #00607c; } /* Keyword */
    code span.op { color: #7b3e91; } /* Operator */
    code span.ot { } /* Other */
    code span.pp { color: #6f4e37; } /* Preprocessor */
    code span.re { } /* RegionMarker */
    code span.sc { color: #9f6807; } /* SpecialChar */
    code span.ss { color: #9f6807; } /* SpecialString */
    code span.st { color: #9f6807; } /* String */
    code span.va { } /* Variable */
    code span.vs { color: #9f6807; } /* VerbatimString */
    code span.wa { color: #6a737d; font-weight: bold; } /* Warning */
    ```
